version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: triage-postgres
    environment:
      POSTGRES_USER: triage_user
      POSTGRES_PASSWORD: triage_password
      POSTGRES_DB: triage_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: triage-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: